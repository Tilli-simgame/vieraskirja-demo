<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vieraskirja Admin - Hallinta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/retro.css">
    <style>
        body { text-align: center; }
        .admin-main { max-width: 800px; margin: 0 auto; text-align: left; }
        
        .admin-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px dashed var(--border-color); 
            padding-bottom: 15px; 
            margin-bottom: 30px; 
        }
        .admin-header h1 { font-size: 2em; margin: 0; }

        .login-box { 
            padding: 40px; 
            border: 3px double var(--border-color); 
            background: rgba(255,255,255,0.5);
            border-radius: 15px;
        }

        .github-btn { 
            display: inline-block;
            background: #24292e; 
            color: white !important; 
            padding: 12px 24px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold;
            margin-top: 20px;
        }
        .github-btn:hover { background: #000; transform: scale(1.05); }

        .message-card { 
            background: white; 
            border: 1px dashed var(--border-color); 
            padding: 20px; 
            margin-bottom: 25px; 
            border-radius: 10px;
            box-shadow: 3px 3px 0px var(--shadow-color);
        }
        .message-meta { 
            font-size: 0.9em; 
            color: var(--text-color); 
            margin-bottom: 10px; 
            border-bottom: 1px dotted #ccc;
            padding-bottom: 5px;
        }
        .message-body { margin-bottom: 15px; line-height: 1.5; }

        .reply-box { 
            margin-top: 15px; 
            padding: 10px 15px; 
            background: #fffafa; 
            border-left: 5px solid #ff69b4; 
            font-style: italic;
            color: #d10074;
        }

        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn { 
            padding: 8px 15px; 
            border: 1px solid var(--border-color); 
            background: #fff; 
            cursor: pointer; 
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            border-radius: 5px;
        }
        .btn:hover { background: var(--link-hover-bg); color: var(--link-hover-text); }
        .btn-primary { background: var(--border-color); color: white; border: none; }
        .btn-danger { color: #c62828; border-color: #c62828; }
        .btn-danger:hover { background: #c62828; color: white; }

        /* Modal */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); 
            align-items: center; 
            justify-content: center;
        }
        .modal-content { 
            background: white; 
            padding: 30px; 
            width: 90%; 
            max-width: 500px; 
            border-radius: 20px;
            border: 5px double var(--border-color);
            text-align: left;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--heading-color); }
        .form-group input, .form-group textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px dashed var(--border-color); 
            font-family: inherit;
            font-size: 1em;
        }
    </style>
</head>
<body class="theme-muuta">

<center>
    <div style="max-width: 800px; padding: 20px;">
        <div class="main-content">
            
            <!-- Auth Screen -->
            <div id="auth-check" style="display: none;">
                <div class="login-box">
                    <h1>Ylläpito</h1>
                    <p>Ole hyvä ja kirjaudu sisään hallitaksesi viestejä.</p>
                    <a href="https://gb-demo.anniina-sipria.workers.dev/api/admin/auth/github" class="github-btn">Kirjaudu GitHubilla</a>
                </div>
            </div>

            <!-- Admin Panel -->
            <div id="admin-panel" style="display: none;">
                <div class="admin-main">
                    <header class="admin-header">
                        <h1>Hallinta</h1>
                        <div style="font-size: 0.9em;">
                            Käyttäjä: <strong id="username">...</strong> | 
                            <a href="#" onclick="logout(); return false;">Kirjaudu ulos</a>
                        </div>
                    </header>

                    <div id="messages-container">
                        <p>Ladataan viestejä...</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</center>

<!-- Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Vastaa viestiin</h2>
        <form id="editForm">
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label>Nimi:</label>
                <input type="text" id="edit-name" required>
            </div>
            <div class="form-group">
                <label>Viesti:</label>
                <textarea id="edit-message" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label>Sinun vastauksesi:</label>
                <textarea id="edit-reply" rows="3" placeholder="Kirjoita vastaus..."></textarea>
            </div>
            <div style="text-align: right; margin-top: 20px;">
                <button type="button" onclick="closeModal()" class="btn">Peruuta</button>
                <button type="submit" class="btn btn-primary">Tallenna</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_BASE = 'https://gb-demo.anniina-sipria.workers.dev/api/admin';
    let currentMessages = [];

    async function checkAuth() {
        try {
            const res = await fetch(`${API_BASE}/me`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById('username').textContent = `@${data.user}`;
                document.getElementById('admin-panel').style.display = 'block';
                loadMessages();
            } else {
                document.getElementById('auth-check').style.display = 'block';
            }
        } catch (e) {
            document.getElementById('auth-check').style.display = 'block';
        }
    }

    async function loadMessages() {
        const container = document.getElementById('messages-container');
        try {
            const res = await fetch(`${API_BASE}/messages`);
            const messages = await res.json();
            currentMessages = messages;

            if (messages.length === 0) {
                container.innerHTML = '<p>Ei viestejä hallittavaksi.</p>';
                return;
            }

            container.innerHTML = messages.map(m => `
                <div class="message-card">
                    <div class="message-meta">
                        <strong>${escapeHtml(m.name)}</strong> - 
                        <span>${new Date(m.created_at).toLocaleString('fi-FI')}</span>
                    </div>
                    <div class="message-body">${escapeHtml(m.message)}</div>
                    ${m.admin_reply ? `
                        <div class="reply-box">
                            <strong>Sinun vastauksesi:</strong><br>
                            ${escapeHtml(m.admin_reply)}
                        </div>
                    ` : ''}
                    <div class="controls">
                        <button onclick="openEdit(${m.id})" class="btn">Muokkaa / Vastaa</button>
                        <button onclick="deleteMessage(${m.id})" class="btn btn-danger">Poista</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = '<p style="color: red;">Virhe ladattaessa viestejä.</p>';
        }
    }

    function openEdit(id) {
        const msg = currentMessages.find(m => m.id === id);
        if (!msg) return;

        document.getElementById('edit-id').value = msg.id;
        document.getElementById('edit-name').value = msg.name;
        document.getElementById('edit-message').value = msg.message;
        document.getElementById('edit-reply').value = msg.admin_reply || '';
        
        const modal = document.getElementById('editModal');
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    document.getElementById('editForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const data = {
            name: document.getElementById('edit-name').value,
            message: document.getElementById('edit-message').value,
            admin_reply: document.getElementById('edit-reply').value
        };

        const res = await fetch(`${API_BASE}/messages/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            closeModal();
            loadMessages();
        } else {
            alert('Tallennus epäonnistui.');
        }
    };

    async function deleteMessage(id) {
        if (!confirm('Haluatko varmasti poistaa tämän viestin?')) return;

        const res = await fetch(`${API_BASE}/messages/${id}`, {
            method: 'DELETE'
        });

        if (res.ok) {
            loadMessages();
        } else {
            alert('Poisto epäonnistui.');
        }
    }

    async function logout() {
        await fetch(`${API_BASE}/logout`, { method: 'POST' });
        location.reload();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    window.onclick = function(event) {
        const modal = document.getElementById('editModal');
        if (event.target == modal) closeModal();
    }

    checkAuth();
</script>

</body>
</html>
