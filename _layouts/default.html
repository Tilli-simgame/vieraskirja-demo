<!DOCTYPE html>
<html lang="fi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/retro.css' | relative_url }}">
</head>

<body class="theme-{{ page.theme | default: 'default' }}">

  <center>
    <div style="max-width: 800px; padding: 20px;">
      <div class="main-content">
        {{ content }}
      </div>
    </div>
  </center>

  <center>
    <img class="divider-icon" src="{{ '/assets/img/footer-divider.gif' | relative_url }}" alt="Footer Divider">
    <div class="footer-info">
      This page has been accessed 775 times.<br>
      This page was last updated {{ "now" | date: "%a %b %d %H:%M:%S %Y" }} EET
    </div>
    <br>
    <a href="mailto:{{ site.email }}">
      <img src="{{ '/assets/img/winky.gif' | relative_url }}" alt="Mail me" border="0">
    </a>
    <a href="{{ '/vieraskirja' | relative_url }}">
      <img src="{{ '/assets/img/guest-s.gif' | relative_url }}" alt="Kirjoita vieraskirjaan" border="0">
    </a>
  </center>

</body>

</html>
